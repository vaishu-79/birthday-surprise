<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Happy Birthday SARO ❤️</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- Animated Background -->

<div class="stars"></div>

<div class="hearts"></div>

<div class="glow"></div>

<!-- ========================= -->

<!-- WARNING PAGE -->

<!-- ========================= -->

<section id="warningPage"
class="page active">

<div class="glass">

<h1>

⚠️ Warning ⚠️

</h1>

<p>

This website contains

a very special surprise

made with lots of love ❤️

</p>

<p>

Only my SARO

can continue...

🥺❤️

</p>

<button id="continueBtn">

Continue ❤️

</button>

</div>

</section>

<!-- ========================= -->

<!-- LOGIN PAGE -->

<!-- ========================= -->

<section id="loginPage"
class="page">

<div class="glass">

<h1>

🔐 Secret Login

</h1>

<p>

Enter the correct details

to unlock your surprise

💖

</p>

<input

type="text"

id="username"

placeholder="Your Name">

<input

type="password"

id="password"

placeholder="Password">

<button id="loginBtn">

Unlock My Surprise

❤️

</button>

<p id="error"></p>

</div>

</section>
