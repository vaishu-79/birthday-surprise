<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday SARO ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Birthday Message -->
    <div class="title">
        <h1>🎉 Happy Birthday SARO ❤️ 🎉</h1>
        <p>You are the best gift in my life 💖</p>
    </div>

    <!-- Cake -->
    <div class="cake-container">

        <!-- Candle -->
        <div class="candle">
            <div class="flame" id="flame"></div>
        </div>

        <!-- Cake Name -->
        <div class="cake-text">
            Happy Birthday
            <br>
            <span>SARO ❤️</span>
        </div>

        <!-- Cake Layers -->
        <div class="cake">

            <div class="icing"></div>

            <div class="layer top"></div>

            <div class="cream cream1"></div>
            <div class="cream cream2"></div>
            <div class="cream cream3"></div>

            <div class="layer middle"></div>

            <div class="cream cream4"></div>
            <div class="cream cream5"></div>
            <div class="cream cream6"></div>

            <div class="layer bottom"></div>

            <!-- Cake Cut Line -->
            <div class="cut-line"></div>

        </div>

    </div>

    <!-- Buttons -->

    <div class="buttons">

        <button id="blowBtn">
            🕯 Blow Candle
        </button>

        <button id="cutBtn">
            🔪 Cut Cake
        </button>

    </div>

    <!-- Birthday Wish -->
    <div class="message">

        <h2 id="wish">
            Make a Wish... ✨
        </h2>

    </div>

    <!-- Confetti -->
    <div id="confetti-container"></div>

    <!-- Music -->
    <audio id="birthdaySong" loop>
        <source src="birthday.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
