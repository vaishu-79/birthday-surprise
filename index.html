<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday SARO ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- Background Effects -->
<div id="stars"></div>
<div id="heartsContainer"></div>
<div id="butterfliesContainer"></div>
<div id="confettiContainer"></div>

<!-- ========================= -->
<!-- Warning Page -->
<!-- ========================= -->

<section id="warningPage" class="page active">

<h1 class="title">⚠️ Warning</h1>

<p class="warningText">
Only one special person should enter this surprise...
</p>

<button id="warningBtn">
Continue ❤️
</button>

</section>

<!-- ========================= -->
<!-- Login Page -->
<!-- ========================= -->

<section id="loginPage" class="page">

<h1 class="title">
🔐 Login
</h1>

<input
type="password"
id="password"
placeholder="Enter Secret Password">

<button id="loginBtn">
Unlock ❤️
</button>

<p id="loginError"></p>

</section>

<!-- ========================= -->
<!-- Birthday Page -->
<!-- ========================= -->

<section id="birthdayPage" class="page">

<h1 class="birthdayTitle">
🎉 Happy Birthday
</h1>

<h2 class="name">
SARO ❤️
</h2>

<button id="startCountdown">
Start Celebration
</button>

</section>

<!-- ========================= -->
<!-- Countdown -->
<!-- ========================= -->

<section id="countdownPage" class="page">

<div id="countdownNumber">
3
</div>

</section>

<!-- ========================= -->
<!-- Cake Page -->
<!-- ========================= -->

<section id="cakePage" class="page">

<h1 class="cakeTitle">

Make a Wish ❤️

</h1>

<!-- Cake -->

<div class="cake">

<div class="candle">

<div id="flame" class="flame"></div>

</div>

<div class="cakeTop"></div>

<div class="cakeMiddle"></div>

<div class="cakeBottom"></div>

</div>

<div id="smoke"></div>

<button id="blowBtn">

💨 Blow Candle

</button>

<button id="cutCakeBtn">

🔪 Cut Cake

</button>

</section>

<!-- ========================= -->
<!-- Cake Cut Result -->
<!-- ========================= -->

<section id="cakeCutPage" class="page">

<h1 class="title">

Happy Birthday My Love ❤️

</h1>

<div class="cutCake">

<div class="leftCake"></div>

<div class="rightCake"></div>

</div>

<button id="nextGallery">

Next ❤️

</button>

</section>

<!-- ========================= -->
<!-- Gallery -->
<!-- ========================= -->

<section id="galleryPage" class="page">

<h1 class="title">

Our Memories ❤️

</h1>

<div class="gallery">

<img id="galleryImage"
src="images/photo1.jpg">

</div>

<div class="galleryButtons">

<button id="prev">

⬅

</button>

<button id="next">

➡

</button>

</div>

<audio
id="birthdaySong"
loop>

<source
src="music/song.mp3"
type="audio/mpeg">

</audio>

<button id="letterBtn">

Open Letter 💌

</button>

</section>

<!-- ========================= -->
<!-- Love Letter -->
<!-- ========================= -->

<section id="letterPage" class="page">

<div class="letterBox">

<h1>

For My Saro ❤️

</h1>

<p id="typingText">

</p>

<button id="surpriseBtn">

Final Surprise 🎁

</button>

</div>

</section>

<!-- ========================= -->
<!-- Final Surprise -->
<!-- ========================= -->

<section id="finalPage" class="page">

<h1 class="finalTitle">

❤️ I LOVE YOU ❤️

</h1>

<h2>

SARO

</h2>

<p>

Forever & Ever...

</p>

<div class="giftBox">

🎁

</div>

<div class="loveMessage">

Made with ❤️ by Vaishnavi

</div>

</section>

<script src="script.js"></script>

</body>
</html>
